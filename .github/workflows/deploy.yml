# 推到 main 分支即自動 build 並部署到 GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node test.js                                # 排盤核心值回歸
      - run: node cross-test.mjs                         # 紫微交叉驗證(弟弟命盤)
      - run: node cross-test-bazi.mjs                    # 八字交叉驗證(弟弟命盤)
      - run: node cross-test-wenmo.mjs                   # 文墨天機交叉驗證(亮度/四化/斗君/自化/來因)
      - run: node --import ./css-hook.mjs smoke.mjs      # UI 冒煙測試(happy-dom)
      - run: npm run build         # 先生成命理小百科靜態頁+sitemap,再 vite build(base './')
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
