<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="免費線上紫微斗數與八字排盤:輸入生辰即得十二宮命盤、四柱八字、白話解讀報告與大限流年瀏覽。所有計算皆在瀏覽器內完成,生辰資料不會上傳。" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="紫微斗數・八字排盤|免費線上排盤與白話解讀" />
    <meta property="og:description" content="輸入生辰即得紫微命盤、八字四柱與白話命盤解析,並可產生專屬命卡分享。" />
    <meta property="og:locale" content="zh_TW" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>紫微斗數・八字排盤</title>
  </head>
  <body>
    <div id="app" class="layout">
      <!-- ============ 側欄 ============ -->
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-icon">命</div>
          <div class="brand-title">紫微斗數<br />八字排盤</div>
        </div>
        <div class="divider"></div>

        <form id="birth-form">
          <div class="section-label">輸入生辰</div>
          <div class="field">
            <label for="name-input">姓名</label>
            <input id="name-input" type="text" placeholder="請輸入姓名" autocomplete="off" />
          </div>
          <div class="field">
            <label>曆法</label>
            <div class="pill-group" id="cal-toggle">
              <button type="button" class="pill active" data-value="solar">陽曆</button>
              <button type="button" class="pill" data-value="lunar">農曆</button>
            </div>
          </div>
          <div class="field">
            <label for="birth-date">出生日期</label>
            <input id="birth-date" type="date" required />
          </div>
          <div class="field">
            <label for="birth-hour">時辰</label>
            <select id="birth-hour"></select>
          </div>
          <div class="field">
            <label>性別</label>
            <div class="pill-group" id="gender-toggle">
              <button type="button" class="pill" data-value="male">男</button>
              <button type="button" class="pill active" data-value="female">女</button>
            </div>
          </div>
          <button type="submit" class="submit-btn">排盤</button>
          <button type="button" id="save-chart-btn" class="save-btn" hidden>☆ 儲存目前命盤</button>
        </form>

        <div id="saved-section" hidden>
          <div class="divider" style="margin-bottom:18px"></div>
          <div class="section-label">已存命盤</div>
          <div id="saved-list" class="saved-list"></div>
        </div>

        <div class="divider"></div>

        <nav class="side-nav">
          <div class="section-label">命盤導覽</div>
          <button class="nav-item active" data-view="dashboard">命盤總覽</button>
          <button class="nav-item" data-view="report">解讀報告</button>
          <button class="nav-item" data-view="comprehensive">命盤解析</button>
          <button class="nav-item" data-view="share">分享命卡</button>
        </nav>
      </aside>

      <!-- ============ 主內容 ============ -->
      <main class="main">
        <div class="page-head">
          <h1 id="page-title">的命盤</h1>
          <div id="birth-summary" class="birth-summary"></div>
          <div class="reading-mode-toggle" id="reading-mode-toggle" hidden>
            <button type="button" class="mode-pill active" data-mode="public">大眾版</button>
            <button type="button" class="mode-pill" data-mode="study">學習版</button>
          </div>
        </div>
        <section id="view-dashboard"></section>
        <section id="view-report" hidden></section>
        <section id="view-comprehensive" hidden></section>
        <section id="view-share" hidden></section>
      </main>
    </div>
    <button id="copy-ai-btn" class="copy-ai-btn" type="button" hidden>
      <span class="copy-ai-icon">AI</span>複製給AI解讀
    </button>
    <div id="toast" class="toast" hidden></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
